## docs: https://docs.github.com/en/actions
name: Deploy and Preview

on:
  push:
    branches:
      - dev-*

  jobs:
  lint:
    name: Lint Code (Preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: echo "Deploying to (Preview) Vercel..."
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run lint
        run: npm run lint
      
      - run: echo "Deployment to (Preview) Vercel complete!"